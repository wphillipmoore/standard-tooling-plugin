name: CI

on:
  pull_request:
  workflow_call:
    inputs:
      run-security:
        type: boolean
        default: true
      run-release:
        type: boolean
        default: true

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ---------------------------------------------------------------------------
  # Quality
  # ---------------------------------------------------------------------------

  quality:
    uses: wphillipmoore/standard-actions/.github/workflows/ci-quality.yml@v1.5
    with:
      language: shell
      versions: '["latest"]'
      container-suffix: base

  mkdocs-build:
    name: "quality / mkdocs-build"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Install mkdocs-material
        run: pip install mkdocs-material

      - name: Build docs
        run: mkdocs build --strict
        working-directory: docs/site

  # ---------------------------------------------------------------------------
  # Security and standards
  # ---------------------------------------------------------------------------

  security:
    uses: wphillipmoore/standard-actions/.github/workflows/ci-security.yml@v1.5
    with:
      language: shell
      run-codeql: false
      run-standards: ${{ inputs.run-release || true }}
      run-security: ${{ inputs.run-security || true }}
    permissions:
      contents: read
      security-events: write

  # ---------------------------------------------------------------------------
  # Release
  # ---------------------------------------------------------------------------

  release:
    uses: wphillipmoore/standard-actions/.github/workflows/ci-release.yml@v1.5
    with:
      language: claude-plugin
      run-release: ${{ inputs.run-release != false }}
